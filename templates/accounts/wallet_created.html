{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center align-items-center vh-100">

<div class="col-md-6">

<div class="glass-card p-5 text-center">

<div class="mb-4">

<h2>
Wallet Created
</h2>

<p class="text-secondary">

Save this code carefully

</p>

</div>

<div
class="p-4 rounded bg-dark">

<h3>

{{ wallet_code }}

</h3>

</div>

<div class="mt-4">

<button
class="btn btn-success"
onclick="copyWallet()">

Copy Wallet

</button>

<a
href="/"
class="btn btn-primary">

Login

</a>

</div>

</div>

</div>

</div>

<script>

function copyWallet(){

navigator.clipboard.writeText(
"{{ wallet_code }}"
)

alert("Wallet copied!")

}

</script>

{% endblock %}
