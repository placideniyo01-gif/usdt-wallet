<!DOCTYPE html>
<html>

<head>

    <title>USDT Wallet</title>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
            background:#0f172a;
            min-height:100vh;
            color:white;
        }

        .glass-card{
            background:rgba(255,255,255,.05);
            backdrop-filter:blur(15px);
            border:1px solid rgba(255,255,255,.1);
            border-radius:20px;
            box-shadow:0 0 30px rgba(0,0,0,.2);
        }

        .balance-card{
            background:
            linear-gradient(
            135deg,
            #2563eb,
            #1e40af
            );

            border-radius:20px;

            color:white;
        }  

        .logo{
            font-size:30px;
            font-weight:700;
        }

        .btn-wallet{
            background:#2563eb;
            color:white;
            border:none;
            border-radius:12px;
            height:50px;
        }

        .btn-wallet:hover{
            background:#1d4ed8;
        }

        .wallet-input{
            height:55px;
            border-radius:12px;
        }

        .bottom-nav{
            position:fixed;
            bottom:0;
            left:0;
            width:100%;
            height:70px;

            background:#111827;

            display:flex;
            justify-content:space-around;
            align-items:center;

            border-top:1px solid rgba(255,255,255,.1);

            z-index:999;
        }

        .bottom-nav a{
            color:white;
            text-decoration:none;
            text-align:center;
            font-size:14px;
        }

        .bottom-nav i{
            display:block;
            font-size:22px;
        }

        .page-space{
            padding-bottom:90px;
        }

        .action-btn{
            height:70px;
            border-radius:20px;
            font-weight:600;
        }

        .history-item{
            padding:15px;
            border-radius:15px;
            background:rgba(255,255,255,.03);
            margin-bottom:10px;
        }

        .toast-message{

        padding:15px;
        margin-bottom:10px;
        border-radius:12px;
        color:white;
        font-weight:600;

        backdrop-filter:blur(10px);

        animation:slideIn .4s ease;

        }

        .success{
        background:#198754;
        }

        .error{
        background:#dc3545;
        }

        .warning{
        background:#fd7e14;
        }

        @keyframes slideIn{

        from{
        transform:translateX(100%);
        opacity:0;
        }

        to{
        transform:translateX(0);
        opacity:1;
        }

        }

    </style>

</head>

<body>

{% if messages %}

<div
id="toast-container"
style="
position:fixed;
top:20px;
right:20px;
z-index:9999;
width:350px;
">

{% for message in messages %}

<div
class="toast-message

{% if message.tags == 'success' %}
success
{% elif message.tags == 'error' %}
error
{% else %}
warning
{% endif %}
">

{{ message }}

</div>

{% endfor %}

</div>

{% endif %}

<div class="container">

{% block content %}

{% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

<script>

setTimeout(()=>{

const container =
document.getElementById(
'toast-container'
)

if(container){

container.style.transition =
'0.5s'

container.style.opacity =
'0'

setTimeout(()=>{

container.remove()

},500)

}

},5000)

</script>

</html>
