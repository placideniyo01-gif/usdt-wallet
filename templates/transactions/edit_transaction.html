<!DOCTYPE html>
<html>
<head>
    <title>Edit Transaction</title>
</head>
<body>

<h2>Edit Transaction</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <p>
        Amount:
        <input type="number"
               step="0.01"
               name="amount"
               value="{{ tx.amount }}"
               required>
    </p>

    {% if tx.transaction_type == "DEPOSIT" or tx.transaction_type == "BUY" %}
    <p>
        Screenshot:
        <input type="file" name="screenshot">
    </p>
    {% endif %}

    {% if tx.transaction_type == "SELL" %}
    <p>
        Phone:
        <input type="text" name="phone">
    </p>

    <p>
        Receiver Name:
        <input type="text" name="receiver_name">
    </p>
    {% endif %}

    {% if tx.transaction_type == "EXTERNAL" %}
    <p>
        Wallet Address:
        <input type="text"
               name="wallet_address"
               value="{{ tx.receiver_wallet }}">
    </p>
    {% endif %}

    <button type="submit">
        Update Transaction
    </button>

</form>

</body>
</html>
