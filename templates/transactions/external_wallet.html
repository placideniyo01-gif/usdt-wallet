{% extends 'base.html' %}

{% block content %}

<div class="container py-4">

<div class="glass-card p-4">

<h3>

External Wallet

</h3>

<div class="alert alert-warning">

Use TRC20 wallet address only.

</div>

<div class="alert alert-info">

Minimum Withdrawal:
<strong>10 USDT</strong>

<br>

Maximum Daily Withdrawal:
<strong>1000 USDT</strong>

</div>

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label>

Wallet Address

</label>

<input
type="text"
name="wallet_address"
class="form-control"
required>

</div>

<div class="mb-3">

<label>

Amount

</label>

<input
type="number"
step="0.01"
name="amount"
id="amount"
class="form-control"
required>

</div>

<div class="alert alert-info">

Withdrawal Fee:

<strong id="fee">

0 USDT

</strong>

</div>

<button
class="btn btn-warning w-100">

Continue

</button>

</form>

</div>

</div>

<script>

document
.getElementById('amount')
.addEventListener(
'input',
function(){

let amount =
parseFloat(this.value) || 0

let fee = 0

if(amount <= 100){

fee = 2

}
else if(amount <= 300){

fee = 3

}
else if(amount <= 500){

fee = 4

}
else{

fee = 5

}

document
.getElementById(
'fee'
).innerHTML =
fee.toFixed(2) +
' USDT'

}
)

</script>

{% endblock %}
