{% extends 'base.html' %}

{% block content %}

<div class="container py-4">

<div class="glass-card p-4">

<h3>

Internal Transfer

</h3>

<p class="text-secondary">

Send USDT instantly to another wallet.

</p>

<form method="POST">

{% csrf_token %}

<input
type="hidden"
name="preview"
value="1">

<div class="mb-3">

<label>

Receiver Wallet Code

</label>

<input
type="text"
name="wallet_code"
class="form-control">

</div>

<div class="mb-3">

<label>

Amount

</label>

<input
type="number"
step="0.01"
name="amount"
class="form-control">

</div>

<div class="alert alert-info">

You are about to transfer funds
to another wallet.

Please verify the wallet code carefully.

</div>

<button
class="btn btn-info w-100">

Continue

</button>

</form>

</div>

</div>

{% endblock %}
