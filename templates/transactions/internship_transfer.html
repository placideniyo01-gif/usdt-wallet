{% extends "base.html" %}

{% block content %}

<div class="container py-4">

<div class="glass-card p-4">

<h3>

Internship Saving

</h3>

<form method="POST">

{% csrf_token %}

<label>

Receiver Username

</label>

<input
type="text"
name="username"
class="form-control"
required>

<br>

<label>

Amount

</label>

<input
type="number"
step="0.01"
name="amount"
class="form-control"
required>

<br>

<button
class="btn btn-secondary w-100">

Continue

</button>

</form>

</div>

</div>

{% endblock %}
